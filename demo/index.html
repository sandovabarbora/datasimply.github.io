<!DOCTYPE html>
<html lang="en">
<head>

<title>datasimply — Ye's Kafe Analysis</title>
<meta name="description" content="Competitive intelligence demo for specialty coffee.">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useRef,useEffect}=React;const SYS=`You are a data advisor for Ye's Kafe in Prague, built by datasimply.eu (Barbora Šandová). You are an econometrician. You NEVER give naive advice.\n\nDATA:\n- 2 locations: Letná (2015) + Karlín (newer, wine+coffee)\n- Supplier: Bonanza Coffee Roasters, Berlin (imported, higher cost than local Czech roasters)\n- Google 4.6/5, TripAdvisor 4.6/5 (24 reviews)\n- Espresso 65 CZK, Double 80, Americano 80, Batch brew 85-105 CZK\n- Competitor avg espresso in Letná: 58 CZK\n- Competitors: Café Letka (55 CZK, midnight hours), Letec (55), Pilot (55, brunch), EMA (60, 3 locations, 15K IG, own roastery Alf&Bet), VNITROBLOCK (65, Nordbeans, great pastry+interior)\n- Reviews: coffee quality +75%, staff +58%, atmosphere +50% declining, price -21% (n=5 from 24), interior -17% (n=4), food -17%, bitter espresso -13%\n- Facebook 4,071 likes. Concept: espresso bar + graphic design studio. Chinese porcelain cups.\n- Ye's survived 9+ years at this price and opened a second location.\n\nAPPROACH: Mention sample size limitations. Distinguish correlation from causation. Say "we don't have enough data" when true. 3-5 sentences. Be warm.`;function Chat(){const[msgs,setMsgs]=useState([{role:"assistant",content:"I have your public reviews, competitor pricing, and some context about your business. I'll be honest about what the data supports and what it doesn't. What would you like to know?"}]);const[inp,setInp]=useState("");const[busy,setBusy]=useState(false);const end=useRef(null);useEffect(()=>{end.current?.scrollIntoView({behavior:"smooth"})},[msgs]);const go=async(t)=>{const m=t||inp.trim();if(!m||busy)return;const next=[...msgs,{role:"user",content:m}];setMsgs(next);setInp("");setBusy(true);try{const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,system:SYS,messages:next.filter((_,i)=>i>0).map(x=>({role:x.role,content:x.content}))})});const d=await r.json();setMsgs(p=>[...p,{role:"assistant",content:d.content?.map(b=>b.text||"").join("\n")||"Let me try again."}])}catch(e){setMsgs(p=>[...p,{role:"assistant",content:"Connection issue. In production this runs against your live business data."}])}setBusy(false)};return(<div><div style={{height:300,overflowY:"auto",marginBottom:12}}>{msgs.map((m,i)=>(<div key={i} style={{marginBottom:20}}><div style={{fontSize:10,letterSpacing:".08em",textTransform:"uppercase",color:"#b5a99a",marginBottom:5}}>{m.role==="user"?"You":"datasimply"}</div><div style={{fontSize:14,lineHeight:1.75,color:m.role==="user"?"#1a1714":"#4a3f34",whiteSpace:"pre-wrap",paddingLeft:m.role==="assistant"?16:0,borderLeft:m.role==="assistant"?"2px solid #d4c5b0":"none"}}>{m.content}</div></div>))}{busy&&<div style={{fontSize:14,color:"#b5a99a",paddingLeft:16,borderLeft:"2px solid #d4c5b0"}}>Thinking...</div>}<div ref={end}/></div><div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>{["Should I lower my prices?","Is our interior actually a problem?","Are we losing to EMA?","What data do I actually need?"].map(s=>(<button key={s} onClick={()=>go(s)} style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:12,padding:"6px 12px",background:"transparent",border:"1px solid #d4c5b0",color:"#6b5e50",cursor:"pointer",borderRadius:0}}>{s}</button>))}</div><div style={{display:"flex"}}><input value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} placeholder="Ask about your business" style={{flex:1,fontFamily:"'Source Sans 3',sans-serif",fontSize:14,padding:"12px 16px",background:"#fff",border:"1px solid #d4c5b0",borderRight:"none",color:"#1a1714",outline:"none"}}/><button onClick={()=>go()} disabled={busy} style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:13,padding:"12px 24px",background:"#1a1714",border:"1px solid #1a1714",color:"#f5f0e8",cursor:"pointer",fontWeight:600}}>Send</button></div></div>)}function Bar({label,pct,dark}){return(<div style={{display:"flex",alignItems:"center",gap:12,marginBottom:8}}><div style={{width:130,fontSize:13,color:"#4a3f34"}}>{label}</div><div style={{flex:1,height:3,background:"#e4ddd2"}}><div style={{height:"100%",width:`${pct}%`,background:dark?"#1a1714":"#b5a99a",transition:"width 0.6s ease"}}/></div><div style={{width:36,fontSize:12,color:"#6b5e50",textAlign:"right"}}>{pct}%</div></div>)}const S={wrap:{maxWidth:700,margin:"0 auto",padding:"56px 24px",fontFamily:"'Source Sans 3',sans-serif",color:"#1a1714"},section:{marginBottom:64},label:{fontSize:10,letterSpacing:".14em",textTransform:"uppercase",color:"#b5a99a",marginBottom:8},h2:{fontFamily:"'Playfair Display',Georgia,serif",fontSize:"1.5rem",fontWeight:400,lineHeight:1.3,marginBottom:6},body:{fontSize:14,color:"#6b5e50",lineHeight:1.75},rule:{height:1,background:"#d4c5b0",margin:"0 0 64px"},naive:{fontSize:14,color:"#b5a99a",lineHeight:1.7,textDecoration:"line-through",textDecorationColor:"#d4c5b0",marginBottom:16},real:{fontSize:15,color:"#1a1714",lineHeight:1.8}};const App=function(){return(<div style={{background:"#f5f0e8",minHeight:"100vh"}}><div style={S.wrap}><div style={{...S.section,marginBottom:48}}><div style={S.label}>datasimply.eu</div><h1 style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:"2.4rem",fontWeight:400,lineHeight:1.15,marginBottom:16,maxWidth:520}}>What most consultants would get wrong about Ye's Kafe</h1><p style={{...S.body,maxWidth:480}}>We analyzed your public data — reviews, pricing, competitors. But instead of giving you a to-do list, we'll show you what the data actually supports, what it doesn't, and where everyone else would jump to the wrong conclusion.</p></div><div style={{display:"flex",gap:40,marginBottom:16,flexWrap:"wrap"}}>{[{n:"4.6",l:"Google rating",s:"top 15% in Prague"},{n:"65",l:"CZK per espresso",s:"Bonanza Berlin beans"},{n:"9+",l:"years at this price",s:"opened 2nd location since"},{n:"24",l:"reviews analyzed",s:"small sample — we'll be honest about that"}].map(v=>(<div key={v.l} style={{flex:"1 1 130px"}}><div style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:"2.6rem",fontWeight:700,lineHeight:1}}>{v.n}</div><div style={{fontSize:12,fontWeight:600,color:"#6b5e50",marginTop:4}}>{v.l}</div><div style={{fontSize:11,color:"#b5a99a",marginTop:1}}>{v.s}</div></div>))}</div><div style={S.rule}/><div style={S.section}><div style={S.label}>Analysis</div><h2 style={{...S.h2,marginBottom:24}}>Three things everyone gets wrong</h2><div style={{marginBottom:48}}><div style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:"1.2rem",color:"#d4c5b0",marginBottom:12}}>01</div><div style={S.naive}>"Your espresso is the most expensive in Letná. Lower your price to 59 CZK and you'll make more money."</div><div style={S.real}><p style={{marginBottom:12}}>This advice ignores why your espresso costs 65 CZK. You import Bonanza beans from Berlin. Your competitors — Café Letka, Letec, Pilot — roast locally or use Czech suppliers. Their input costs are structurally lower. Comparing raw prices without controlling for cost of goods is the kind of analysis that sounds smart and costs you money.</p><p style={{marginBottom:12}}>More importantly: you've charged 65 CZK for nine years and opened a second location. If the price were killing demand, Karlín wouldn't exist. The market has already told you something that 24 TripAdvisor reviews cannot override.</p><p style={{marginBottom:12}}>The issue isn't the price. It's whether the customer understands what they're paying for. Bonanza beans, the Chinese porcelain, the art studio concept — if these are invisible in the experience, the price feels arbitrary. If they're part of the story the customer walks away with, the price feels like a bargain.</p><div style={{background:"#eee8dc",padding:"14px 18px",marginTop:16,fontSize:13,lineHeight:1.7,color:"#4a3f34"}}><span style={{fontWeight:700}}>What I'd actually do:</span> Before touching the price, test whether making the value visible changes perception. Menu cards with the Bonanza origin story. A small sign about the porcelain history. Track whether "price" mentions in new reviews decrease over the next 60 days.</div></div></div><div style={{marginBottom:48}}><div style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:"1.2rem",color:"#d4c5b0",marginBottom:12}}>02</div><div style={S.naive}>"17% of reviews mention your interior needs work. Invest 15,000 CZK immediately — you'll recoup it in weeks."</div><div style={S.real}><p style={{marginBottom:12}}>17% sounds alarming until you count: that's 4 people out of 24. The 95% confidence interval for that proportion is roughly 5% to 38%. We genuinely cannot tell if this is a real pattern or four people having a bad day.</p><p style={{marginBottom:12}}>What is more interesting: the mentions appear to cluster in newer reviews rather than older ones. If there's a trend — the space is degrading over time — that's a different and more urgent signal. But with this sample size, we can't confirm it.</p><div style={{background:"#eee8dc",padding:"14px 18px",marginTop:16,fontSize:13,lineHeight:1.7,color:"#4a3f34"}}><span style={{fontWeight:700}}>What I'd actually do:</span> Collect targeted data. A one-question exit survey — physical card by the door or QR code on the receipt. Run it for 30 days, get 50+ responses. Cost: zero. Time: one month. Confidence: high.</div></div></div><div style={{marginBottom:0}}><div style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:"1.2rem",color:"#d4c5b0",marginBottom:12}}>03</div><div style={S.naive}>"EMA Espresso has 3 locations, 15K Instagram followers, and their own roastery. You're falling behind."</div><div style={S.real}><p style={{marginBottom:12}}>EMA and Ye's operate in fundamentally different market positions. EMA is optimized for volume: own roastery, no WiFi, paper-cup-free. They built a machine.</p><p style={{marginBottom:12}}>Ye's is optimized for experience: imported Berlin beans, an art studio upstairs, Chinese porcelain, WiFi. You built a place people want to be in.</p><p style={{marginBottom:12}}>Comparing Instagram followers between these two models is like comparing a neighborhood bookshop to Amazon by units shipped. The metrics that matter for Ye's are revenue per square meter, average time per visit, and customer lifetime value. We don't have those from public data.</p><div style={{background:"#eee8dc",padding:"14px 18px",marginTop:16,fontSize:13,lineHeight:1.7,color:"#4a3f34"}}><span style={{fontWeight:700}}>What I'd actually do:</span> Stop benchmarking against EMA. Find the 2-3 cafés that share your model — experience-first, premium sourcing, small footprint. Your real competitive set might be VNITROBLOCK or even wine bars.</div></div></div></div><div style={S.rule}/><div style={S.section}><div style={S.label}>Review intelligence</div><h2 style={{...S.h2,marginBottom:6}}>What 24 reviews reliably tell us</h2><p style={{...S.body,marginBottom:20,maxWidth:520}}>Small sample, but the direction of signals is useful even when point estimates aren't precise.</p><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:40}}><div><div style={{fontSize:11,fontWeight:700,letterSpacing:".06em",color:"#4a3f34",marginBottom:14}}>CLEAR STRENGTHS</div><Bar label="Coffee quality" pct={75} dark/><Bar label="Staff and service" pct={58} dark/><Bar label="Atmosphere" pct={50}/><Bar label="Work-friendly" pct={25}/><p style={{fontSize:12,color:"#b5a99a",fontStyle:"italic",lineHeight:1.6,marginTop:14}}>"Best coffee in Letná" — "Serious coffee people making good coffee"</p></div><div><div style={{fontSize:11,fontWeight:700,letterSpacing:".06em",color:"#4a3f34",marginBottom:14}}>SIGNALS TO WATCH</div><Bar label="Price perception" pct={21} dark/><Bar label="Interior upkeep" pct={17}/><Bar label="Food selection" pct={17}/><Bar label="Espresso bitterness" pct={13}/><p style={{fontSize:12,color:"#b5a99a",lineHeight:1.6,marginTop:14}}>Note: at n=24, all percentages here have confidence intervals wider than ±15pp. Treat as directions, not facts.</p></div></div><div style={{background:"#eee8dc",padding:"14px 18px",marginTop:24,fontSize:13,lineHeight:1.7,color:"#4a3f34"}}><span style={{fontWeight:700}}>The reliable finding:</span> Your staff is your strongest asset. Net sentiment for service is +82 — consistent across all platforms. This holds up even with small samples. Protect this at all costs.</div></div><div style={S.rule}/><div style={S.section}><div style={S.label}>Try it</div><h2 style={{...S.h2,marginBottom:6}}>An AI advisor that thinks before it answers</h2><p style={{...S.body,marginBottom:20,maxWidth:520}}>Loaded with your public data. Ask it anything — it will tell you what it knows, what it doesn't, and what you'd need to find out.</p><Chat/></div><div style={S.rule}/><div style={S.section}><div style={S.label}>Data security</div><h2 style={{...S.h2,marginBottom:6}}>The risk nobody talks about</h2><p style={{...S.body,marginBottom:20,maxWidth:520}}>If you collect emails, run loyalty programs, or offer WiFi, you're handling personal data under EU law.</p><div style={{borderTop:"1px solid #d4c5b0"}}>{[{s:1,l:"Encrypted connection",d:"Your website uses HTTPS — this is correct"},{s:0,l:"Cookie consent mechanism",d:"EU regulations require explicit opt-in, not just a banner"},{s:-1,l:"Two-factor authentication",d:"One compromised password gives full access to your systems"},{s:0,l:"Network isolation",d:"Customer WiFi and payment terminals should never share a network"},{s:-1,l:"Data backups",d:"If a device fails tomorrow, can you recover your customer records?"},{s:0,l:"Staff access controls",d:"Every barista with the admin password is a potential entry point"}].map((c,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:16,padding:"14px 0",borderBottom:"1px solid #ece6dc"}}><div style={{width:6,height:6,borderRadius:99,flexShrink:0,background:c.s===1?"#1a1714":c.s===-1?"#9a3412":"#d4c5b0"}}/><div style={{flex:1}}><div style={{fontSize:14,fontWeight:600}}>{c.l}</div><div style={{fontSize:12,color:"#8a7e72"}}>{c.d}</div></div><div style={{fontSize:10,fontWeight:600,letterSpacing:".06em",color:c.s===1?"#1a1714":c.s===-1?"#9a3412":"#b5a99a"}}>{c.s===1?"PASS":c.s===-1?"FAIL":"REVIEW"}</div></div>))}</div></div><div style={S.rule}/><div style={S.section}><div style={S.label}>How I work</div><h2 style={{...S.h2,marginBottom:20}}>The difference is in what I won't tell you</h2><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:24}}>{[{t:"Everyone else",items:["Your prices are too high — lower them","Your reviews mention X — fix X","Your competitor has more followers — post more","Here's a dashboard with 47 charts"]},{t:"What I do",items:["Your prices reflect your costs — let's test if communicating value changes perception","4 reviews isn't evidence — let's collect data that is","You and your competitor serve different markets — let's find your real benchmark","Here's the one number you need to watch this month"]}].map(col=>(<div key={col.t}><div style={{fontSize:11,fontWeight:700,letterSpacing:".06em",color:"#4a3f34",marginBottom:12}}>{col.t.toUpperCase()}</div>{col.items.map((item,i)=>(<div key={i} style={{fontSize:13,color:col.t==="Everyone else"?"#b5a99a":"#1a1714",lineHeight:1.7,marginBottom:8,textDecoration:col.t==="Everyone else"?"line-through":"none",textDecorationColor:"#d4c5b0",fontWeight:col.t==="Everyone else"?400:500}}>{item}</div>))}</div>))}</div></div><div style={S.rule}/><div style={{padding:"56px 0 40px",textAlign:"center",borderTop:"1px solid #d4c5b0"}}><h2 style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:"1.7rem",fontWeight:400,lineHeight:1.35,maxWidth:440,margin:"0 auto 14px"}}>Most consultants would have told you to lower your prices.</h2><p style={{fontSize:14,color:"#6b5e50",maxWidth:400,margin:"0 auto 28px",lineHeight:1.7}}>I'm Barbora — data engineer, econometrician, and the kind of person who checks the confidence interval before giving advice.</p><a href="mailto:barbora@datasimply.eu?subject=Let's%20talk" style={{display:"inline-block",padding:"14px 36px",background:"#1a1714",color:"#f5f0e8",textDecoration:"none",fontSize:14,fontWeight:600,fontFamily:"'Source Sans 3',sans-serif"}}>barbora@datasimply.eu</a><div style={{marginTop:20,fontSize:12,color:"#b5a99a"}}>datasimply.eu — Prague and Berlin</div></div><div style={{textAlign:"center",fontSize:10,color:"#d4c5b0",paddingBottom:32}}>Data collected April 2026 from Google, TripAdvisor, Foursquare, and public competitor websites.</div></div></div>)};ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
